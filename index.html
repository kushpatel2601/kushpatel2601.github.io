from flask import Flask, render_template_string

app = Flask(__name__)

# HTML template as a string
html_template = '''
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* Prevent scrollbars from showing */
            background-color: #000; /* Set black background */
        }
        h1 {
            margin-bottom: 20px;
            color: white; /* Set text color to white for visibility */
        }
        .button-container {
            padding: 20px;
            border-radius: 10px;
            background: black;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative; /* For positioning the circular waves */
        }
        .button {
            padding: 15px 30px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
            width: 200px;
        }
        .start-quiz {
            background-color: #0ef016;
            color: white;
        }
        .start-quiz:hover {
            background-color: #a06945;
        }
        .register-quiz {
            background-color: #0698f3;
            color: white;
        }
        .register-quiz:hover {
            background-color: #007bb5;
        }
        /* Circular wave styles */
        .waves {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Disable pointer events on waves */
            overflow: hidden;
        }
        .wave {
            position: absolute;
            border-radius: 50%;
            opacity: 0.5;
            animation: wave 5s infinite;
        }
        /* Animate the waves */
        @keyframes wave {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }
            50% {
                opacity: 0.5;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }
        /* Different colored waves */
        .wave:nth-child(1) {
            background: rgba(255, 127, 255, 0.5);
            top: 20%;
            left: 50%;
            width: 300px;
            height: 300px;
            animation-duration: 4s;
        }
        .wave:nth-child(2) {
            background: rgba(255, 255, 127, 0.5);
            top: 40%;
            left: 50%;
            width: 400px;
            height: 400px;
            animation-duration: 5s;
        }
        .wave:nth-child(3) {
            background: rgba(127, 255, 255, 0.5);
            top: 60%;
            left: 50%;
            width: 500px;
            height: 500px;
            animation-duration: 6s;
        }
    </style>
</head>
<body>

    <h1>Welcome to the Quiz</h1>
    <div class="button-container">
        <button class="button start-quiz" onclick="openGoogleForm('https://docs.google.com/forms/d/e/1FAIpQLSc2OBFQ7PUtUHBbFosOIMLQ6rnVYvwc_hKws0hnRQM_dafLBA/viewform?usp=header')">Start Quiz</button>
        <button class="button register-quiz" onclick="openGoogleForm('https://docs.google.com/forms/d/e/1FAIpQLSdjNRCUosOoVhMcEF0SY5PBKf2-P7w_IYs3eGhjy9oI8UnrKw/viewform?usp=header')">Register for Quiz</button>
    </div>

    <div class="waves">
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <script>
        function openGoogleForm(url) {
            window.open(url, '_blank');
        }
    </script>

</body>
</html>
'''

@app.route('/')
def home():
    return render_template_string(html_template)

if __name__ == '__main__':
    app.run(debug=True)
